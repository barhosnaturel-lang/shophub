<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kök Atölye | Doğal Şifa Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #059669; --dark: #0f172a; --bg: #f8fafc; --white: #ffffff; --secondary: #ec4899; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); padding-bottom: 100px; }
        header { background: white; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        header h1 { color: var(--primary); font-size: 2rem; font-weight: 800; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .search-box { width: 100%; max-width: 500px; margin: 15px auto; display: block; padding: 12px 20px; border-radius: 50px; border: 1px solid #ddd; outline: none; }
        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px; scrollbar-width: none; }
        .cat-pill { padding: 8px 20px; background: white; border-radius: 50px; cursor: pointer; border: 1px solid #eee; white-space: nowrap; font-weight: 600; }
        .cat-pill.active { background: var(--primary); color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.03); transition: 0.3s; position: relative; border: 1px solid #f1f5f9; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 250px; object-fit: contain; background: #fff; padding: 15px; }
        .wish { position: absolute; top: 15px; right: 15px; color: #cbd5e1; font-size: 1.2rem; cursor: pointer; z-index: 5; }
        .wish.active { color: var(--secondary); }
        .p-body { padding: 20px; }
        .p-body h3 { font-size: 0.95rem; height: 45px; overflow: hidden; margin-bottom: 10px; color: #1e293b; }
        .price { font-weight: 800; color: var(--primary); font-size: 1.3rem; }
        .btn-add { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; margin-top: 15px; }
        /* WhatsApp Sabit */
        .wa-float { position: fixed; bottom: 25px; right: 25px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 9999; text-decoration: none; }
        #cart-count { background: var(--secondary); color: white; padding: 2px 8px; border-radius: 50%; font-size: 0.8rem; vertical-align: middle; }
    </style>
</head>
<body>

<header>
    <h1>KÖK ATÖLYE</h1>
    <input type="text" class="search-box" id="sInput" placeholder="Ürün ara..." onkeyup="filter()">
</header>

<div class="container">
    <div class="categories" id="cats">
        <div class="cat-pill active" onclick="filterCat('all')">Tümü</div>
    </div>
    <div class="grid" id="pGrid"></div>
</div>

<a href="https://wa.me/905448433547?text=Merhaba, bir ürün hakkında sorum var." class="wa-float" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<script>
    const products = [
        { id: 1, name: 'Pembe Himalaya Kaya Tuzu', cat: 'Tuz', price: 180, img: 'https://cdn.dsmcdn.com/ty1769/prod/QC_PREP/20251007/12/d2b3d436-35de-3c8b-87d9-cc2a1bd1b425/1_org_zoom.jpg' },
        { id: 2, name: 'Okaliptus Yağı', cat: 'Bakım Yağı', price: 200, img: 'https://cdn.dsmcdn.com/ty1761/prod/QC_PREP/20250926/10/1fa43a7c-a004-3491-8916-448ec1297410/1_org_zoom.jpg' },
        { id: 3, name: 'Gilaburu Nektarı', cat: 'Fonksiyonel İçecek', price: 280, img: 'https://cdn.dsmcdn.com/ty1762/prod/QC_ENRICHMENT/20250925/22/096ef9da-3aba-3404-900d-c4f39efb5b64/1_org_zoom.jpg' },
        { id: 4, name: 'Kızılcık Özü', cat: 'Gurme & Organik', price: 275, img: 'https://cdn.dsmcdn.com/ty1763/prod/QC_PREP/20250925/11/29bf1373-fccd-33eb-bae2-32ad11411598/1_org_zoom.jpg' },
        { id: 5, name: 'Domates Kurusu Konservesi', cat: 'Kuru Sebze', price: 325, img: 'https://cdn.dsmcdn.com/ty1762/prod/QC_PREP/20250925/10/474a7bf0-6c57-33ed-9fdd-8282a2298412/1_org_zoom.jpg' },
        { id: 6, name: 'Vesile Sarımsak Yağı', cat: 'Bakım Yağı', price: 135, img: 'https://cdn.dsmcdn.com/ty1762/prod/QC_PREP/20250925/10/36dc9c4e-c75a-300a-93f2-b1213ddcd7c9/1_org_zoom.jpg' },
        { id: 7, name: 'Bal Bal', cat: 'Bal', price: 299, img: 'https://cdn.dsmcdn.com/ty1753/prod/QC_PREP/20250916/16/9a284da0-7109-3dae-bce7-b0835a9c5d0b/1_org_zoom.jpg' },
        { id: 8, name: 'Kozalak Macunu 240 Gr', cat: 'Gurme & Organik', price: 175, img: 'https://cdn.dsmcdn.com/ty1790/prod/QC_ENRICHMENT/20251116/18/915d71c2-ca08-319e-956b-6d0deb2dfc3b/1_org_zoom.jpg' },
        { id: 9, name: 'At Kestane Balsamı', cat: 'Vücut Kremi', price: 300, img: 'https://cdn.dsmcdn.com/ty1749/prod/QC_PREP/20250904/10/837fb63d-f1ac-36f1-9859-bcaf0c02380a/1_org_zoom.jpg' },
        { id: 10, name: 'Pars Mate Çayı', cat: 'Aktar Ürünleri', price: 185, img: 'https://cdn.dsmcdn.com/ty1712/prod/QC_PREP/20250717/22/90e00b2e-3e02-3ffe-b0f0-95edb507ead8/1_org_zoom.jpg' },
        { id: 11, name: 'Tahin Çifte Kavrulmuş', cat: 'Tahin', price: 250, img: 'https://cdn.dsmcdn.com/ty1742/prod/QC_PREP/20250901/11/7c413ec0-abe3-3e33-8c8f-aeb10fa8a5d9/1_org_zoom.jpg' },
        { id: 12, name: 'Kantaron Yağı 400ml', cat: 'Bakım Yağı', price: 550, img: 'https://cdn.dsmcdn.com/ty1738/prod/QC_PREP/20250827/14/bc65fa1f-0d68-3a5b-a479-6d46e58c59f2/1_org_zoom.jpg' }
    ];

    function draw(list) {
        document.getElementById('pGrid').innerHTML = list.map(p => `
            <div class="card">
                <i class="fas fa-heart wish" onclick="this.classList.toggle('active')"></i>
                <img src="${p.img}">
                <div class="p-body">
                    <small style="color:var(--primary); font-weight:700">${p.cat}</small>
                    <h3>${p.name}</h3>
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <span class="price">${p.price} TL</span>
                        <button class="btn-add" onclick="order('${p.name}')" style="width:auto; padding:8px 15px">Sipariş</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function filter() {
        const s = document.getElementById('sInput').value.toLowerCase();
        draw(products.filter(p => p.name.toLowerCase().includes(s)));
    }

    function filterCat(c) {
        document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        draw(c === 'all' ? products : products.filter(p => p.cat === c));
    }

    function order(name) {
        window.open(`https://wa.me/905448433547?text=Merhaba, ${name} ürününü sipariş vermek istiyorum.`);
    }

    // Kategorileri diz
    const cList = ['Tuz', 'Bakım Yağı', 'Fonksiyonel İçecek', 'Bal', 'Gurme & Organik', 'Aktar Ürünleri'];
    cList.forEach(c => {
        document.getElementById('cats').innerHTML += `<div class="cat-pill" onclick="filterCat('${c}')">${c}</div>`;
    });

    draw(products);
</script>
</body>
</html>
